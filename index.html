<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login/Cadastro - Bot Manager</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
      from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgIROe4i7jjXTHBubIFEjNvxuaTfzGuao",
      authDomain: "painel-log.firebaseapp.com",
      projectId: "painel-log",
      storageBucket: "painel-log.firebasestorage.app",
      messagingSenderId: "460411586537",
      appId: "1:460411586537:web:395a73d7cd5e30ead8ed78",
      measurementId: "G-F9XLSLN5V2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");

      // Login
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginPassword").value;

        signInWithEmailAndPassword(auth, email, senha)
          .then(() => {
            if (email === "admin@painel.com") {
              window.location.href = "painel.html?role=owner";
            } else {
              window.location.href = "painel.html?role=member";
            }
          })
          .catch(() => {
            document.getElementById("loginError").textContent = "Usuário ou senha inválidos!";
          });
      });

      // Cadastro
      signupForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("signupEmail").value;
        const senha = document.getElementById("signupPassword").value;

        createUserWithEmailAndPassword(auth, email, senha)
          .then(() => {
            alert("Cadastro realizado com sucesso! Agora faça login.");
          })
          .catch((error) => {
            document.getElementById("signupError").textContent = "Erro: " + error.message;
          });
      });
    });
  </script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://i.imgur.com/Yd2W5Ny.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }
    .container {
      display: flex;
      justify-content: center;
    }
    .box {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }
    .box h2 { margin-bottom: 20px; color: #111827; }
    .box input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 8px; border: 1px solid #ccc;
    }
    .box button {
      width: 100%; padding: 10px;
      background: #10b981; border: none;
      border-radius: 8px; color: #fff;
      cursor: pointer; transition: background 0.3s;
    }
    .box button:hover { background: #059669; }
    .error { color: red; font-size: 0.9em; margin-top: 10px; }
    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <!-- Cabeçalho com título -->
  <div class="header">
    <h1>Faça seu Login</h1>
  </div>

  <div class="container">
    <!-- Login + Cadastro juntos -->
    <div class="box">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Senha" required>
        <button type="submit">Entrar</button>
        <div class="error" id="loginError"></div>
      </form>

      <hr>

      <h2>Cadastrar</h2>
      <form id="signupForm">
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Senha (mínimo 6 caracteres)" required>
        <button type="submit">Registrar</button>
        <div class="error" id="signupError"></div>
      </form>
    </div>
  </div>
</body>
</html>
